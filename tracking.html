<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TJ Stone · Live Tracking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0a0a0a;color:#f0f0ec;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    header{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:48px;background:#0d0d0d;border-bottom:1px solid #1e1e1e;flex-shrink:0;gap:1rem}
    .htitle{font-weight:700;font-size:0.95rem;letter-spacing:0.06em;white-space:nowrap}
    .htitle span{color:#555;font-weight:400;font-size:0.8rem;margin-left:0.4rem}
    .hright{display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
    .status-pill{display:inline-flex;align-items:center;gap:0.35rem;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.25rem 0.65rem;border:1px solid #333;color:#888}
    .status-pill.live{border-color:#4a7c3f;color:#5d9e50}
    .status-pill.offline{border-color:#553333;color:#884444}
    .dot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0}
    .status-pill.live .dot{background:#5d9e50;animation:blink 1.5s infinite}
    .lupd{font-size:0.65rem;color:#444;white-space:nowrap}
    .admin-link{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#555;border:1px solid #222;padding:0.25rem 0.65rem;text-decoration:none;transition:all 0.2s;white-space:nowrap}
    .admin-link:hover{color:#f0f0ec;border-color:#555}
    .main{display:flex;flex:1;overflow:hidden}
    .sidebar{width:250px;flex-shrink:0;background:#0d0d0d;border-right:1px solid #1e1e1e;overflow-y:auto;display:flex;flex-direction:column}
    .sbs{padding:0.85rem 1rem;border-bottom:1px solid #151515}
    .sbl{font-size:0.6rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#444;margin-bottom:0.6rem}
    .ir{display:flex;justify-content:space-between;margin-bottom:0.3rem}
    .ik{font-size:0.68rem;color:#555}
    .iv{font-size:0.68rem;color:#ccc;text-align:right}
    .inp{width:100%;background:#111;border:1px solid #2a2a2a;color:#f0f0ec;font-size:0.72rem;padding:0.45rem 0.6rem;margin-bottom:0.4rem;transition:border-color 0.2s}
    .inp:focus{outline:none;border-color:#555}
    .inp::placeholder{color:#333}
    .btn{width:100%;padding:0.55rem;background:#111;border:1px solid #2a2a2a;color:#666;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:0.4rem}
    .btn:hover{border-color:#555;color:#f0f0ec}
    .btn-green{background:#2d4d25;border-color:#4a7c3f;color:#5d9e50}
    .btn-green:hover{background:#3d6d35;color:#fff}
    .rider-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;border-bottom:1px solid #111}
    .rider-item:last-child{border-bottom:none}
    .rider-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .rider-name{font-size:0.78rem;color:#ccc;flex:1}
    .rider-age{font-size:0.62rem;color:#444}
    .rider-item.expired .rider-name{color:#444}
    .route-item{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0;cursor:pointer;border-bottom:1px solid #111}
    .route-item:last-child{border-bottom:none}
    .route-item:hover .rname{color:#f0f0ec}
    .rcheck{width:13px;height:13px;border:1px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px}
    .rswatch{width:18px;height:3px;border-radius:1px;flex-shrink:0}
    .rname{font-size:0.75rem;color:#888;flex:1}
    .imsg{font-size:0.65rem;margin-top:0.3rem;display:none}
    #map{flex:1;background:#111}
    .leaflet-popup-content-wrapper{background:#0d0d0d!important;border:1px solid #333!important;border-radius:0!important;box-shadow:none!important;color:#f0f0ec!important}
    .leaflet-popup-tip{background:#0d0d0d!important}
    .leaflet-popup-close-button{color:#888!important}
    .leaflet-control-zoom a{background:#111!important;color:#888!important;border-color:#333!important}
    .leaflet-control-zoom a:hover{color:#fff!important}
    .leaflet-control-attribution{background:rgba(10,10,10,0.8)!important;color:#333!important;font-size:9px!important}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    @media(max-width:640px){
      .sidebar{width:100%;height:200px;border-right:none;border-bottom:1px solid #1e1e1e;flex-direction:row;overflow-x:auto}
      .main{flex-direction:column}
      .sbs{min-width:200px;border-bottom:none;border-right:1px solid #151515}
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:0.75rem;overflow:hidden;min-width:0">
    <div class="htitle">Live Tracking <span>Powered by Breakaway Timing</span></div>
    <div class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">Loading...</span></div>
    <div class="lupd" id="lupd"></div>
  </div>
  <div class="hright">
    <a class="admin-link" href="tracking-admin.html" target="_blank">Admin</a>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <!-- ADD YOURSELF -->
    <div class="sbs">
      <div class="sbl">Add Your Tracking</div>
      <input class="inp" type="text" id="riderName" placeholder="Your name"/>
      <input class="inp" type="url" id="riderURL" placeholder="Garmin LiveTrack URL"/>
      <button class="btn btn-green" onclick="submitRider()">Track Me</button>
      <div class="imsg" id="submitMsg"></div>
    </div>

    <!-- ACTIVE RIDERS -->
    <div class="sbs">
      <div class="sbl">Active Riders <span id="riderCount" style="color:#4a7c3f"></span></div>
      <div id="riderList"><div style="font-size:0.72rem;color:#333;padding:0.25rem 0">No riders yet</div></div>
      <button class="btn" onclick="loadRiders()" style="margin-top:0.5rem">↻ Refresh Riders</button>
    </div>

    <!-- SPOT -->
    <div class="sbs">
      <div class="sbl">SPOT Satellite</div>
      <div class="ir"><span class="ik">Status</span><span class="iv" id="sStatus">Fetching...</span></div>
      <div class="ir"><span class="ik">Points</span><span class="iv" id="sPoints">—</span></div>
      <div class="ir"><span class="ik">Last</span><span class="iv" id="sTime">—</span></div>
    </div>

    <!-- ROUTES -->
    <div class="sbs">
      <div class="sbl">Route Overlays</div>
      <div id="routeList"></div>
      <input type="file" accept=".gpx" id="gpxFile" style="display:none" onchange="loadGPX(this)"/>
      <button class="btn" onclick="document.getElementById('gpxFile').click()">+ Upload GPX</button>
    </div>

  </div>

  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

const FIREBASE   = "https://breakaway-timing-results-default-rtdb.europe-west1.firebasedatabase.app";
const SPOT_URL   = FIREBASE + "/spot_feed/0MEGXy63EBb4ZJnr4qqWjpSI0cHbVJlMg/message.json";
const SPOT_API   = "https://api.findmespot.com/spot-main-web/consumer/rest-api/2.0/public/feed/0MEGXy63EBb4ZJnr4qqWjpSI0cHbVJlMg/message.json";
const RIDERS_URL = FIREBASE + "/riders.json";
const EXPIRE_MS  = 12 * 60 * 60 * 1000; // 12 hours
const REFRESH_MS = 150000;
const GARMIN_MS  = 30000;

// Rider colors pool
const COLORS = ["#3498db","#e74c3c","#9b59b6","#f39c12","#1abc9c","#e67e22","#e91e63","#00bcd4","#8bc34a","#ff5722"];

let riderLayers  = {};
let riderMarkers = {};
let spotLayer    = null;
let spotMarker   = null;
let breadMarkers = [];
let routeLayers  = {};
let routeActive  = {};
let customCount  = 0;
let allRiders    = {};

// MAP
const map = L.map("map", { center: [40.5, -111.8], zoom: 7 });
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:19
}).addTo(map);

const breadIcon = L.divIcon({
  className:"",
  html:'<div style="width:5px;height:5px;background:#4a7c3f;border-radius:50%;opacity:0.6"></div>',
  iconSize:[5,5],iconAnchor:[2,2]
});

const spotIcon = L.divIcon({
  className:"",
  html:'<svg width="22" height="30" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg"><path d="M11 0C4.9 0 0 4.9 0 11c0 8.25 11 19 11 19S22 19.25 22 11C22 4.9 17.1 0 11 0z" fill="#5d9e50" stroke="#2d4d25" stroke-width="1.5"/><circle cx="11" cy="11" r="4" fill="white"/></svg>',
  iconSize:[22,30],iconAnchor:[11,30],popupAnchor:[0,-32]
});

function riderIcon(color) {
  return L.divIcon({
    className:"",
    html:'<div style="width:14px;height:14px;background:'+color+';border:2px solid #0d0d0d;border-radius:50%;box-shadow:0 0 0 3px '+color+'44"></div>',
    iconSize:[14,14],iconAnchor:[7,7]
  });
}

// ── SUBMIT RIDER ──
function submitRider() {
  const name = document.getElementById("riderName").value.trim();
  const url  = document.getElementById("riderURL").value.trim();
  const msg  = document.getElementById("submitMsg");

  if (!name) { showIM(msg,"#884444","Please enter your name."); return; }
  if (!url || !url.startsWith("http")) { showIM(msg,"#884444","Please enter a valid URL."); return; }

  const rider = { name, url, submittedAt: Date.now(), expiresAt: Date.now() + EXPIRE_MS };

  fetch(FIREBASE + "/riders.json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(rider)
  })
  .then(r => r.json())
  .then(() => {
    showIM(msg,"#5d9e50","You're on the map!");
    document.getElementById("riderName").value = "";
    document.getElementById("riderURL").value = "";
    loadRiders();
  })
  .catch(() => showIM(msg,"#884444","Error saving. Try again."));
}

// ── LOAD RIDERS ──
function loadRiders() {
  fetch(RIDERS_URL)
    .then(r => r.json())
    .then(data => {
      allRiders = data || {};
      const now = Date.now();

      // Clean up expired riders
      const expired = Object.entries(allRiders).filter(([,v]) => v.expiresAt < now);
      expired.forEach(([key]) => {
        fetch(FIREBASE + "/riders/" + key + ".json", { method: "DELETE" });
        delete allRiders[key];
      });

      const active = Object.entries(allRiders).filter(([,v]) => v.expiresAt >= now);
      document.getElementById("riderCount").textContent = active.length ? "(" + active.length + ")" : "";

      // Build rider list in sidebar
      const list = document.getElementById("riderList");
      if (!active.length) {
        list.innerHTML = '<div style="font-size:0.72rem;color:#333;padding:0.25rem 0">No active riders</div>';
        return;
      }

      list.innerHTML = active.map(([key, r], i) => {
        const color = COLORS[i % COLORS.length];
        const minsLeft = Math.round((r.expiresAt - now) / 60000);
        const hoursLeft = minsLeft > 59 ? Math.floor(minsLeft/60) + "h " + (minsLeft%60) + "m" : minsLeft + "m";
        return '<div class="rider-item" id="ri-' + key + '">' +
          '<div class="rider-dot" style="background:' + color + '"></div>' +
          '<div class="rider-name">' + r.name + '</div>' +
          '<div class="rider-age">' + hoursLeft + '</div>' +
          '</div>';
      }).join("");

      // Fetch each rider's Garmin data
      active.forEach(([key, r], i) => {
        const color = COLORS[i % COLORS.length];
        fetchGarminRider(key, r, color);
      });

      // Update overall status
      document.getElementById("statusText").textContent = active.length + " rider" + (active.length !== 1 ? "s" : "") + " live";
      document.getElementById("statusPill").className = "status-pill live";
      document.getElementById("lupd").textContent = "Updated " + new Date().toLocaleTimeString();
    })
    .catch(() => {});
}

// ── FETCH GARMIN FOR A RIDER ──
function fetchGarminRider(key, rider, color) {
  // Garmin LiveTrack KML endpoint
  let kmlURL = rider.url;
  if (!kmlURL.includes("kml") && !kmlURL.includes("format=")) {
    kmlURL += (kmlURL.includes("?") ? "&" : "?") + "format=kml";
  }

  fetch(kmlURL)
    .then(r => r.text())
    .then(kml => {
      const doc = new DOMParser().parseFromString(kml, "text/xml");
      const coordEls = doc.querySelectorAll("coordinates");
      const points = [];
      coordEls.forEach(c => {
        c.textContent.trim().split(/\s+/).forEach(pair => {
          const parts = pair.split(",");
          const lng = parseFloat(parts[0]);
          const lat = parseFloat(parts[1]);
          if (!isNaN(lat) && !isNaN(lng)) points.push([lat, lng]);
        });
      });

      if (!points.length) return;

      // Remove old layers
      if (riderLayers[key])  { map.removeLayer(riderLayers[key]);  delete riderLayers[key]; }
      if (riderMarkers[key]) { map.removeLayer(riderMarkers[key]); delete riderMarkers[key]; }

      // Draw trail
      riderLayers[key] = L.polyline(points, { color, weight: 2.5, opacity: 0.8 }).addTo(map);

      // Marker at latest point
      const latest = points[points.length - 1];
      riderMarkers[key] = L.marker(latest, { icon: riderIcon(color) })
        .addTo(map)
        .bindPopup('<div style="font-family:Arial,sans-serif">' +
          '<div style="font-size:0.65rem;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Garmin LiveTrack</div>' +
          '<div style="font-size:0.9rem;font-weight:700;color:' + color + '">' + rider.name + '</div>' +
          '<div style="font-size:0.72rem;color:#aaa;margin-top:4px">' + latest[0].toFixed(5) + ', ' + latest[1].toFixed(5) + '</div>' +
          '</div>');
    })
    .catch(() => {});
}

// ── SPOT ──
function fetchSPOT() {
  fetch(SPOT_API)
    .then(r => r.json())
    .then(data => {
      const resp = data.response;
      if (resp.errors) { document.getElementById("sStatus").textContent = "No data"; return; }
      const msgs = resp.feedMessageResponse?.messages?.message;
      if (!msgs) { document.getElementById("sStatus").textContent = "No messages"; return; }
      const messages = Array.isArray(msgs) ? msgs : [msgs];
      const cutoff = Date.now()/1000 - (12 * 60 * 60);
      const points = messages
        .filter(m => m.latitude !== -99999 && m.longitude !== -99999 && m.unixTime >= cutoff)
        .sort((a,b) => a.unixTime - b.unixTime);
      if (!points.length) return;

      const latest = points[points.length - 1];
      const ageMins = Math.round((Date.now()/1000 - latest.unixTime) / 60);
      document.getElementById("sStatus").textContent = ageMins < 15 ? "Live" : ageMins + "m ago";
      document.getElementById("sPoints").textContent = points.length;
      document.getElementById("sTime").textContent = new Date(latest.unixTime*1000).toLocaleTimeString();

      const latlngs = points.map(p => [p.latitude, p.longitude]);

      // Clear previous layers and all breadcrumb dots before redrawing
      if (spotLayer)  { map.removeLayer(spotLayer);  spotLayer  = null; }
      if (spotMarker) { map.removeLayer(spotMarker); spotMarker = null; }
      breadMarkers.forEach(m => map.removeLayer(m));
      breadMarkers = [];

      spotLayer = L.polyline(latlngs, { color:"#4a7c3f", weight:2, opacity:0.6, dashArray:"5 5" }).addTo(map);
      points.slice(0,-1).forEach(p => {
        const m = L.marker([p.latitude,p.longitude],{icon:breadIcon}).addTo(map);
        breadMarkers.push(m);
      });

      spotMarker = L.marker([latest.latitude,latest.longitude],{icon:spotIcon})
        .addTo(map)
        .bindPopup('<div style="font-family:Arial,sans-serif">' +
          '<div style="font-size:0.65rem;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">SPOT Satellite</div>' +
          '<div style="font-size:0.8rem;font-weight:700;color:#5d9e50">' + (latest.messageType||"Track") + '</div>' +
          '<div style="font-size:0.72rem;color:#aaa;margin-top:4px">' + new Date(latest.unixTime*1000).toLocaleTimeString() + '</div>' +
          '<div style="font-size:0.72rem;color:#aaa">' + latest.latitude.toFixed(5) + ', ' + latest.longitude.toFixed(5) + '</div>' +
          '</div>');
    })
    .catch(() => { document.getElementById("sStatus").textContent = "Error"; });
}

function buildRouteList() {
  const list = document.getElementById("routeList");
  list.innerHTML = "";
  Object.entries(gpxRoutes).forEach(([key, r]) => addRouteItem(list, key, r.label, r.color, r.coords));
}

function addRouteItem(container, key, label, color, coords) {
  const div = document.createElement("div");
  div.className = "route-item";
  div.innerHTML = '<div class="rcheck" id="chk-'+key+'" style="border-color:#333"></div>' +
    '<div class="rswatch" style="background:'+color+'"></div>' +
    '<div class="rname">'+label+'</div>';
  div.onclick = () => toggleRoute(key, color, coords);
  container.appendChild(div);
}

function toggleRoute(key, color, coords) {
  const chk = document.getElementById("chk-"+key);
  if (routeActive[key]) {
    if (routeLayers[key]) { map.removeLayer(routeLayers[key]); delete routeLayers[key]; }
    chk.style.background="transparent"; chk.style.borderColor="#333"; chk.textContent="";
    routeActive[key]=false;
  } else {
    if (!coords) return;
    routeLayers[key] = L.polyline(coords,{color,weight:3,opacity:0.85}).addTo(map);
    chk.style.background=color; chk.style.borderColor=color; chk.textContent="✓";
    routeActive[key]=true;
    map.fitBounds(routeLayers[key].getBounds(),{padding:[50,50]});
  }
}

function loadGPX(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const gpx = new DOMParser().parseFromString(e.target.result,"text/xml");
    const pts = Array.from(gpx.querySelectorAll("trkpt,rtept"));
    if (!pts.length) { alert("No track points found."); return; }
    const coords = pts.map(p=>[parseFloat(p.getAttribute("lat")),parseFloat(p.getAttribute("lon"))]);
    const color = COLORS[customCount % COLORS.length];
    const key   = "gpx_"+Date.now();
    const label = file.name.replace(".gpx","");
    gpxRoutes[key]={label,color,coords};
    customCount++;
    addRouteItem(document.getElementById("routeList"),key,label,color,coords);
    toggleRoute(key,color,coords);
  };
  reader.readAsText(file);
  input.value="";
}

function showIM(el, color, text) {
  el.style.color=color; el.textContent=text; el.style.display="block";
  setTimeout(()=>{el.style.display="none";},3500);
}

// ── INIT ──
buildRouteList();
loadRiders();
fetchSPOT();
setInterval(loadRiders, GARMIN_MS);
setInterval(fetchSPOT, REFRESH_MS);
