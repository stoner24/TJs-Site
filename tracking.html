<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TJ Stone · Live Tracking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0a0a0a;color:#f0f0ec;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* HEADER */
    header{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:48px;background:#0d0d0d;border-bottom:1px solid #1e1e1e;flex-shrink:0;gap:1rem}
    .header-title{font-weight:700;font-size:0.95rem;letter-spacing:0.06em;white-space:nowrap}
    .header-title span{color:#555;font-weight:400;font-size:0.8rem;margin-left:0.4rem}
    .header-right{display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
    .status-pill{display:inline-flex;align-items:center;gap:0.35rem;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.25rem 0.65rem;border:1px solid #333;color:#888}
    .status-pill.live{border-color:#4a7c3f;color:#5d9e50}
    .status-pill.stale{border-color:#555;color:#888}
    .status-pill.offline{border-color:#553333;color:#884444}
    .dot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0}
    .status-pill.live .dot{background:#5d9e50;animation:pulse 1.5s infinite}
    .last-upd{font-size:0.65rem;color:#444;white-space:nowrap}
    .admin-link{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#555;border:1px solid #222;padding:0.25rem 0.65rem;text-decoration:none;transition:all 0.2s;white-space:nowrap}
    .admin-link:hover{color:#f0f0ec;border-color:#555}

    /* LAYOUT */
    .main{display:flex;flex:1;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:240px;flex-shrink:0;background:#0d0d0d;border-right:1px solid #1e1e1e;overflow-y:auto;display:flex;flex-direction:column}
    .sb-section{padding:0.85rem 1rem;border-bottom:1px solid #151515}
    .sb-label{font-size:0.6rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#444;margin-bottom:0.6rem}
    .info-row{display:flex;justify-content:space-between;margin-bottom:0.3rem}
    .ik{font-size:0.68rem;color:#555}
    .iv{font-size:0.68rem;color:#ccc;text-align:right}

    /* Source indicators */
    .source-row{display:flex;gap:0.5rem;margin-bottom:0.5rem}
    .source-badge{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.5rem;border:1px solid #222;color:#555}
    .source-badge.active-garmin{border-color:#3498db;color:#3498db}
    .source-badge.active-spot{border-color:#4a7c3f;color:#5d9e50}

    /* Route items */
    .route-item{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0;cursor:pointer;border-bottom:1px solid #111}
    .route-item:last-child{border-bottom:none}
    .route-item:hover .rname{color:#f0f0ec}
    .rcheck{width:13px;height:13px;border:1px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px}
    .rcheck.on{color:white}
    .rswatch{width:18px;height:3px;border-radius:1px;flex-shrink:0}
    .rname{font-size:0.75rem;color:#888;flex:1}

    .btn{width:100%;padding:0.55rem;background:#111;border:1px solid #2a2a2a;color:#666;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:0.6rem}
    .btn:hover{border-color:#555;color:#f0f0ec}

    /* MAP */
    #map{flex:1;background:#111}

    /* LEAFLET */
    .leaflet-popup-content-wrapper{background:#0d0d0d!important;border:1px solid #333!important;border-radius:0!important;box-shadow:none!important;color:#f0f0ec!important}
    .leaflet-popup-tip{background:#0d0d0d!important}
    .leaflet-popup-close-button{color:#888!important}
    .leaflet-control-zoom a{background:#111!important;color:#888!important;border-color:#333!important}
    .leaflet-control-zoom a:hover{color:#fff!important}
    .leaflet-control-attribution{background:rgba(10,10,10,0.8)!important;color:#333!important;font-size:9px!important}
    .leaflet-control-attribution a{color:#444!important}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    @media(max-width:640px){
      .sidebar{width:100%;height:160px;border-right:none;border-bottom:1px solid #1e1e1e;flex-direction:row;overflow-x:auto}
      .main{flex-direction:column}
      .sb-section{min-width:180px;border-bottom:none;border-right:1px solid #151515}
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:0.75rem;overflow:hidden">
    <div class="header-title">TJ Stone <span>Live Tracking</span></div>
    <div class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">Loading...</span></div>
    <div class="last-upd" id="lastUpd"></div>
  </div>
  <div class="header-right">
    <a class="admin-link" href="tracking-admin.html" target="_blank">Admin</a>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sb-section">
      <div class="sb-label">Active Sources</div>
      <div class="source-row">
        <div class="source-badge" id="badgeGarmin">Garmin</div>
        <div class="source-badge" id="badgeSPOT">SPOT</div>
      </div>
      <div class="sb-label" style="margin-top:0.5rem">Last Position</div>
      <div class="info-row"><span class="ik">Lat</span><span class="iv" id="iLat">—</span></div>
      <div class="info-row"><span class="ik">Lng</span><span class="iv" id="iLng">—</span></div>
      <div class="info-row"><span class="ik">Time</span><span class="iv" id="iTime">—</span></div>
      <div class="info-row"><span class="ik">Source</span><span class="iv" id="iSrc">—</span></div>
      <button class="btn" onclick="refresh()">↻ Refresh</button>
    </div>

    <div class="sb-section">
      <div class="sb-label">Garmin LiveTrack</div>
      <div class="info-row"><span class="ik">Status</span><span class="iv" id="gStatus">Not set</span></div>
      <div class="info-row"><span class="ik">Points</span><span class="iv" id="gPoints">—</span></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">SPOT Satellite</div>
      <div class="info-row"><span class="ik">Status</span><span class="iv" id="sStatus">Fetching...</span></div>
      <div class="info-row"><span class="ik">Points</span><span class="iv" id="sPoints">—</span></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Add Garmin LiveTrack</div>
      <div style="font-size:0.68rem;color:#444;margin-bottom:0.5rem;line-height:1.5;">Paste your LiveTrack share link before a race</div>
      <input type="url" id="garminInput" placeholder="https://livetrack.garmin.com/..." style="width:100%;background:#111;border:1px solid #2a2a2a;color:#f0f0ec;font-size:0.72rem;padding:0.5rem 0.65rem;margin-bottom:0.4rem"/>
      <button class="btn" onclick="saveGarminFromMain()" style="margin-top:0">Set Link</button>
      <div id="garminInputMsg" style="font-size:0.65rem;margin-top:0.35rem;color:#555;display:none"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Route Overlays</div>
      <div id="routeList"></div>
      <input type="file" accept=".gpx" id="gpxFile" style="display:none" onchange="loadGPX(this)"/>
      <button class="btn" onclick="document.getElementById('gpxFile').click()">+ Upload GPX</button>
    </div>

  </div>

  <div id="map"></div>
</div>

// ── BUILD ROUTE LIST ──
function buildRouteList() {
  const list = document.getElementById("routeList");
  list.innerHTML = "";
  Object.entries(gpxRoutes).forEach(([key, r]) => {
    addRouteItem(list, key, r.label, r.color);
  });
}

function addRouteItem(container, key, label, color) {
  const div = document.createElement("div");
  div.className = "route-item";
  div.innerHTML = '<div class="rcheck" id="chk-' + key + '" style="background:transparent;border-color:#333"></div>'
    + '<div class="rswatch" style="background:' + color + '"></div>'
    + '<div class="rname">' + label + '</div>';
  div.onclick = () => toggleRoute(key, color, gpxRoutes[key]?.coords);
  container.appendChild(div);
}

function toggleRoute(key, color, coords) {
  const chk = document.getElementById("chk-" + key);
  if (routeActive[key]) {
    if (routeLayers[key]) { map.removeLayer(routeLayers[key]); delete routeLayers[key]; }
    chk.style.background = "transparent";
    chk.style.borderColor = "#333";
    chk.textContent = "";
    routeActive[key] = false;
  } else {
    if (!coords) return;
    routeLayers[key] = L.polyline(coords, { color, weight: 3, opacity: 0.85 }).addTo(map);
    chk.style.background = color;
    chk.style.borderColor = color;
    chk.textContent = "✓";
    routeActive[key] = true;
    map.fitBounds(routeLayers[key].getBounds(), { padding: [50,50] });
  }
}

// ── GPX UPLOAD ──
function loadGPX(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const gpx = new DOMParser().parseFromString(e.target.result, "text/xml");
    const pts = Array.from(gpx.querySelectorAll("trkpt,rtept"));
    if (!pts.length) { alert("No track points found."); return; }
    const coords = pts.map(p => [parseFloat(p.getAttribute("lat")), parseFloat(p.getAttribute("lon"))]);
    const color  = ["#e74c3c","#9b59b6","#1abc9c","#f39c12","#e67e22"][customRouteCount % 5];
    const key    = "gpx_" + Date.now();
    const label  = file.name.replace(".gpx","");
    gpxRoutes[key] = { label, color, coords };
    customRouteCount++;
    const list = document.getElementById("routeList");
    addRouteItem(list, key, label, color);
    toggleRoute(key, color, coords);
  };
  reader.readAsText(file);
  input.value = "";
}

// ── GARMIN LIVETRACK ──
function fetchGarmin() {
  garminURL = localStorage.getItem("garminURL") || "";
  if (!garminURL) {
    document.getElementById("gStatus").textContent = "No link set";
    document.getElementById("badgeGarmin").className = "source-badge";
    return;
  }

  // Garmin LiveTrack KML feed
  const kmlURL = garminURL.includes("kml") ? garminURL
    : garminURL.replace("liveTrack","liveTrack") + (garminURL.includes("?") ? "&" : "?") + "format=kml";

  fetch(kmlURL)
    .then(r => r.text())
    .then(kml => {
      const doc = new DOMParser().parseFromString(kml, "text/xml");
      const coords = doc.querySelectorAll("coordinates");
      const points = [];
      coords.forEach(c => {
        c.textContent.trim().split(/\s+/).forEach(pair => {
          const [lng, lat] = pair.split(",").map(Number);
          if (!isNaN(lat) && !isNaN(lng)) points.push([lat, lng]);
        });
      });

      if (!points.length) {
        document.getElementById("gStatus").textContent = "No data";
        document.getElementById("badgeGarmin").className = "source-badge";
        return;
      }

      document.getElementById("gStatus").textContent = "Live";
      document.getElementById("gPoints").textContent = points.length;
      document.getElementById("badgeGarmin").className = "source-badge active-garmin";

      // Draw Garmin trail
      if (garminLayer) map.removeLayer(garminLayer);
      garminLayer = L.polyline(points, { color: "#3498db", weight: 2.5, opacity: 0.8 }).addTo(map);

      // Garmin marker at latest point
      const latest = points[points.length - 1];
      if (garminMarker) map.removeLayer(garminMarker);
      garminMarker = L.marker(latest, { icon: garminIcon })
        .addTo(map)
        .bindPopup('<div style="font-family:Arial,sans-serif"><div style="font-size:0.65rem;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Garmin LiveTrack</div><div style="font-size:0.8rem;color:#3498db;font-weight:700">Live Position</div><div style="font-size:0.72rem;color:#aaa;margin-top:4px">' + latest[0].toFixed(5) + ', ' + latest[1].toFixed(5) + '</div></div>');

      updatePrimaryInfo(latest, "Garmin");
      map.setView(latest, Math.max(map.getZoom(), 12));
    })
    .catch(() => {
      document.getElementById("gStatus").textContent = "Error";
      document.getElementById("badgeGarmin").className = "source-badge";
    });
}

// ── SPOT ──
function fetchSPOT() {
  fetch(SPOT_URL)
    .then(r => r.json())
    .then(data => {
      const resp = data.response;
      if (resp.errors) { spotStatus("No Data"); return; }
      const msgs = resp.feedMessageResponse?.messages?.message;
      if (!msgs) { spotStatus("No Messages"); return; }
      const messages = Array.isArray(msgs) ? msgs : [msgs];
      const points = messages
        .filter(m => m.latitude !== -99999 && m.longitude !== -99999)
        .sort((a,b) => a.unixTime - b.unixTime);

      if (!points.length) { spotStatus("No Position"); return; }

      const latest = points[points.length - 1];
      const ageMins = (Date.now()/1000 - latest.unixTime) / 60;

      document.getElementById("sPoints").textContent = points.length;
      document.getElementById("badgeSPOT").className = "source-badge active-spot";
      spotStatus(ageMins < 15 ? "Live" : ageMins < 120 ? Math.round(ageMins) + "m ago" : "Old");

      // Draw SPOT breadcrumbs
      const latlngs = points.map(p => [p.latitude, p.longitude]);
      if (spotLayer) map.removeLayer(spotLayer);
      spotLayer = L.polyline(latlngs, { color: "#4a7c3f", weight: 2, opacity: 0.6, dashArray: "5 5" }).addTo(map);

      // Breadcrumb dots
      points.slice(0, -1).forEach(p => L.marker([p.latitude, p.longitude], { icon: breadIcon }).addTo(map));

      // SPOT marker at latest
      if (spotMarker) map.removeLayer(spotMarker);
      spotMarker = L.marker([latest.latitude, latest.longitude], { icon: spotIcon })
        .addTo(map)
        .bindPopup('<div style="font-family:Arial,sans-serif"><div style="font-size:0.65rem;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">SPOT Satellite</div><div style="font-size:0.8rem;color:#5d9e50;font-weight:700">' + (latest.messageType || "Track") + '</div><div style="font-size:0.72rem;color:#aaa;margin-top:4px">' + new Date(latest.unixTime*1000).toLocaleTimeString() + '</div><div style="font-size:0.72rem;color:#aaa">' + latest.latitude.toFixed(5) + ', ' + latest.longitude.toFixed(5) + '</div></div>');

      // Only update primary info from SPOT if Garmin is not active
      if (!garminURL) updatePrimaryInfo([latest.latitude, latest.longitude], "SPOT Satellite");

      // Overall status
      updateOverallStatus(ageMins);
    })
    .catch(() => { spotStatus("Error"); });
}

function spotStatus(txt) {
  document.getElementById("sStatus").textContent = txt;
  if (txt === "Error" || txt === "No Data" || txt === "No Messages") {
    document.getElementById("badgeSPOT").className = "source-badge";
  }
}

function updatePrimaryInfo(latlng, src) {
  document.getElementById("iLat").textContent  = latlng[0].toFixed(5);
  document.getElementById("iLng").textContent  = latlng[1].toFixed(5);
  document.getElementById("iTime").textContent = new Date().toLocaleTimeString();
  document.getElementById("iSrc").textContent  = src;
}

function updateOverallStatus(spotAgeMins) {
  const hasGarmin = !!garminURL;
  if (hasGarmin) {
    setStatus("live", "Live · Garmin");
  } else if (spotAgeMins < 15) {
    setStatus("live", "Live · SPOT");
  } else if (spotAgeMins < 120) {
    setStatus("stale", Math.round(spotAgeMins) + "m ago");
  } else {
    setStatus("offline", "Offline");
  }
  document.getElementById("lastUpd").textContent = "Updated " + new Date().toLocaleTimeString();
}

function setStatus(cls, txt) {
  const pill = document.getElementById("statusPill");
  pill.className = "status-pill " + cls;
  document.getElementById("statusText").textContent = txt;
  const dot = pill.querySelector(".dot");
  dot.style.background = cls === "live" ? "#5d9e50" : cls === "stale" ? "#888" : "#884444";
}

function refresh() { fetchGarmin(); fetchSPOT(); }

// ── GARMIN FROM MAIN PAGE ──
function saveGarminFromMain() {
  const val = document.getElementById("garminInput").value.trim();
  const msg = document.getElementById("garminInputMsg");
  if (!val) { showInputMsg(msg, "#884444", "Please enter a valid URL."); return; }
  if (!val.startsWith("http")) { showInputMsg(msg, "#884444", "URL must start with http."); return; }
  localStorage.setItem("garminURL", val);
  garminURL = val;
  showInputMsg(msg, "#5d9e50", "Link saved! Fetching...");
  fetchGarmin();
}

function showInputMsg(el, color, text) {
  el.style.color = color;
  el.textContent = text;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 3000);
}

buildRouteList();
// Pre-fill garmin input if a URL is already saved
if (garminURL) {
  const inp = document.getElementById("garminInput");
  if (inp) inp.value = garminURL;
}
fetchSPOT();
fetchGarmin();
setInterval(fetchSPOT, REFRESH_MS);
setInterval(fetchGarmin, 30000); // Garmin updates every 30s

</script>
